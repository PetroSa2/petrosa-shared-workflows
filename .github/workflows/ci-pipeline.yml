name: 'Reusable CI Pipeline'
on:
  workflow_call:
    inputs:
      service-name:
        type: string
        required: true
      image-name:
        type: string
        required: true
      python-version:
        type: string
        required: false
        default: '3.11'
      coverage-threshold:
        type: string
        required: false
        default: '40'
      skip-lint:
        type: boolean
        required: false
        default: false
      skip-test:
        type: boolean
        required: false
        default: false
      skip-security:
        type: boolean
        required: false
        default: false
      skip-docker-build:
        type: boolean
        required: false
        default: false
    secrets:
      dockerhub-username:
        required: false
      dockerhub-token:
        required: false
      codecov-token:
        required: false

    outputs:
      version:
        description: 'Version of the built Docker image'
        value: ${{ jobs.build-and-push.outputs.version }}
      image-url:
        description: 'Full image URL with tag'
        value: ${{ jobs.build-and-push.outputs.image-url }}
      digest:
        description: 'Image digest'
        value: ${{ jobs.build-and-push.outputs.digest }}

jobs:
  # =============================================================================
  # Stage 1: LINT - Fail early if linting fails
  # =============================================================================
  lint:
    name: Lint
    runs-on: petrosa-org-runners
    if: inputs.skip-lint != true
    outputs:
      passed: ${{ steps.result.outputs.passed }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}
          cache: 'pip'

      - name: Cache virtual environment
        uses: actions/cache@v4
        with:
          path: .venv
          key: ${{ runner.os }}-venv-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-venv-

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m venv .venv || echo "Virtual environment already exists"
          source .venv/bin/activate
          pip install ruff==0.3.4 mypy==1.9.0 black==24.3.0

      - name: Run Ruff
        shell: bash
        run: |
          source .venv/bin/activate
          ruff check .

      - name: Run Mypy
        shell: bash
        continue-on-error: true
        run: |
          source .venv/bin/activate
          mypy . || {
            echo "⚠️ Mypy found issues but continuing (non-blocking)"
            exit 0
          }

      - name: Check formatting with Black
        shell: bash
        run: |
          source .venv/bin/activate
          black --check . || {
            echo "⚠️ Black found formatting issues (non-blocking)"
          }

      - id: result
        shell: bash
        run: |
          echo "passed=true" >> $GITHUB_OUTPUT

  # =============================================================================
  # Stage 2: TEST - Only runs if lint passes (fail early!)
  # =============================================================================
  test:
    name: Test
    runs-on: petrosa-org-runners
    needs: lint
    if: ${{ inputs.skip-test != true && (needs.lint.result == 'success' || needs.lint.result == 'skipped') }}

    env:
      MONGODB_URL: "mongodb://testuser:testpass@localhost:27017/testdb" # gitleaks:allow
      MONGODB_URI: "mongodb://testuser:testpass@localhost:27017/testdb" # gitleaks:allow
      NATS_SERVERS: "nats://localhost:4222"
      JWT_SECRET_KEY: "test-jwt-secret-key-for-testing-only"
      BINANCE_TESTNET: "true"
      SIMULATION_ENABLED: "true"
      ENVIRONMENT: "test"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}
          cache: 'pip'

      - name: Cache virtual environment
        uses: actions/cache@v4
        with:
          path: .venv
          key: ${{ runner.os }}-venv-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-venv-

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m venv .venv || echo "Virtual environment already exists"
          source .venv/bin/activate
          pip install -r requirements.txt
          pip install -r requirements-dev.txt || true

      - name: Install pre-commit
        shell: bash
        env:
          BASE_REF: ${{ github.base_ref || 'main' }}
        run: |
          source .venv/bin/activate
          pip install pre-commit
          pre-commit install || true

          # Filter origin/ prefix if exists in BASE_REF
          REF="origin/${BASE_REF#origin/}"
          pre-commit run --from-ref $REF --to-ref HEAD

      - name: Run pytest with coverage
        shell: bash
        run: |
          source .venv/bin/activate
          pytest --cov=. --cov-report=xml --cov-report=term-missing

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.codecov-token }}
          file: ./coverage.xml
          flags: unittests
          fail_ci_if_error: false

  # =============================================================================
  # Stage 3: SECURITY SCAN - Only runs if test passes (fail early!)
  # =============================================================================
  security-scan:
    name: Security Scan
    runs-on: petrosa-org-runners
    needs: test
    if: ${{ inputs.skip-security != true && (needs.test.result == 'success' || needs.test.result == 'skipped') }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        shell: bash
        run: |
          GITLEAKS_VERSION="8.18.4"
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" | tar -xz -C /tmp gitleaks
          /tmp/gitleaks detect --source . --no-git || echo "⚠️ Gitleaks found issues but continuing"
        continue-on-error: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}

      - name: Run Bandit
        shell: bash
        continue-on-error: true
        run: |
          pip install bandit[toml]
          bandit -r . -x ./venv,./.venv -v || {
            echo "⚠️ Bandit found issues but continuing (non-blocking)"
            exit 0
          }

      - name: Run Trivy
        uses: aquasecurity/trivy-action@0.24.0
        continue-on-error: true
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: success() || failure()
        with:
          sarif_file: 'trivy-results.sarif'

  # =============================================================================
  # Stage 4: DOCKER BUILD - Only runs if security scan passes (fail early!)
  # =============================================================================
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: security-scan
    if: ${{ inputs.skip-docker-build != true && needs.security-scan.result == 'success' }}

    outputs:
      image-url: ${{ steps.meta.outputs.tags }}
      version: ${{ steps.version.outputs.version }}
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          # Extract version from pyproject.toml or use run number
          if [ -f pyproject.toml ]; then
            RAW_VERSION=$(sed -n 's/^version = "\([^"]*\)"/\1/p' pyproject.toml)
            BASE_VERSION="v${RAW_VERSION}"
          else
            BASE_VERSION="v0.0.0"
          fi
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          VERSION="${BASE_VERSION}-r${{ github.run_number }}-${SHORT_SHA}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Build version: $VERSION"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.dockerhub-username }}
          password: ${{ secrets.dockerhub-token }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ inputs.image-name }}
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
            COMMIT_SHA=${{ github.sha }}

  # =============================================================================
  # Stage 5: PIPELINE STATUS - Aggregates all stages
  # =============================================================================
  pipeline:
    name: Pipeline
    runs-on: petrosa-org-runners
    needs: [lint, test, security-scan, build-and-push]
    if: always()

    steps:
      - name: Validate upstream job results
        run: |
          echo "lint=${{ needs.lint.result }}"
          echo "test=${{ needs.test.result }}"
          echo "security-scan=${{ needs.security-scan.result }}"
          echo "build-and-push=${{ needs.build-and-push.result }}"

          # Check if critical jobs passed
          FAILED=0

          if [[ "${{ needs.lint.result }}" != "success" ]] && [[ "${{ needs.lint.result }}" != "skipped" ]]; then
            echo "❌ Lint failed or was cancelled"
            FAILED=1
          fi

          if [[ "${{ needs.test.result }}" != "success" ]] && [[ "${{ needs.test.result }}" != "skipped" ]]; then
            echo "❌ Test failed or was cancelled"
            FAILED=1
          fi

          if [[ "${{ needs.security-scan.result }}" != "success" ]] && [[ "${{ needs.security-scan.result }}" != "skipped" ]]; then
            echo "❌ Security scan failed or was cancelled"
            FAILED=1
          fi

          # build-and-push is optional (can be skipped)
          if [[ "${{ needs.build-and-push.result }}" == "failure" ]]; then
            echo "❌ Docker build failed"
            FAILED=1
          fi

          if [ $FAILED -eq 1 ]; then
            exit 1
          fi

          echo "✅ All required checks passed"

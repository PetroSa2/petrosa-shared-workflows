name: 'Reusable CI Pipeline'
on:
  workflow_call:
    inputs:
      service-name:
        type: string
        required: true
      image-name:
        type: string
        required: true
      python-version:
        type: string
        required: false
        default: '3.11'
      coverage-threshold:
        type: string
        required: false
        default: '40'
      skip-lint:
        type: boolean
        required: false
        default: false
      skip-test:
        type: boolean
        required: false
        default: false
      skip-security:
        type: boolean
        required: false
        default: false
      skip-docker-build:
        type: boolean
        required: false
        default: false
    secrets:
      dockerhub-username:
        required: false
      dockerhub-token:
        required: false
      codecov-token:
        required: false

jobs:
  debug:
    name: Debug
    runs-on: petrosa-org-runners
    steps:
      - name: Echo inputs
        run: |
          echo "Service: ${{ inputs.service-name }}"
          echo "Image: ${{ inputs.image-name }}"

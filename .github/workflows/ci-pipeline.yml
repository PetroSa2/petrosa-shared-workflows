name: 'Reusable CI Pipeline'
on:
  workflow_call:
    inputs:
      service-name:
        type: string
        required: true
      image-name:
        type: string
        required: true
      python-version:
        type: string
        required: false
        default: '3.11'
      coverage-threshold:
        type: string
        required: false
        default: '40'
      skip-lint:
        type: boolean
        required: false
        default: false
      skip-test:
        type: boolean
        required: false
        default: false
      skip-security:
        type: boolean
        required: false
        default: false
      skip-docker-build:
        type: boolean
        required: false
        default: false
    secrets:
      dockerhub-username:
        required: false
      dockerhub-token:
        required: false
      codecov-token:
        required: false

jobs:
  # =============================================================================
  # Stage 1: LINT - Fail early if linting fails
  # =============================================================================
  lint:
    name: Lint
    runs-on: petrosa-org-runners
    if: inputs.skip-lint != true
    outputs:
      passed: ${{ steps.result.outputs.passed }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}
          cache: 'pip'

      - name: Cache virtual environment
        uses: actions/cache@v4
        with:
          path: .venv
          key: ${{ runner.os }}-venv-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-venv-

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m venv .venv || echo "Virtual environment already exists"
          source .venv/bin/activate
          pip install ruff==0.3.4 mypy==1.9.0 black==24.3.0

      - name: Run Ruff
        shell: bash
        run: |
          source .venv/bin/activate
          ruff check .

      - name: Run Mypy
        shell: bash
        continue-on-error: true
        run: |
          source .venv/bin/activate
          mypy . || {
            echo "⚠️ Mypy found issues but continuing (non-blocking)"
            exit 0
          }

      - name: Check formatting with Black
        shell: bash
        run: |
          source .venv/bin/activate
          black --check . || {
            echo "⚠️ Black found formatting issues (non-blocking)"
          }

      - id: result
        shell: bash
        run: |
          echo "passed=true" >> $GITHUB_OUTPUT

  # =============================================================================
  # Stage 2: TEST - Only runs if lint passes (fail early!)
  # =============================================================================
  test:
    name: Test
    runs-on: petrosa-org-runners
    needs: lint
    if: ${{ inputs.skip-test != true && (needs.lint.result == 'success' || needs.lint.result == 'skipped') }}

    env:
      MONGODB_URL: "mongodb://testuser:testpass@localhost:27017/testdb" # gitleaks:allow
      MONGODB_URI: "mongodb://testuser:testpass@localhost:27017/testdb" # gitleaks:allow
      NATS_SERVERS: "nats://localhost:4222"
      NATS_ENABLED: "false"
      JWT_SECRET_KEY: "test-jwt-secret-key-for-testing-only"
      BINANCE_TESTNET: "true"
      SIMULATION_ENABLED: "true"
      ENVIRONMENT: "test"
      LOG_LEVEL: "DEBUG"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}
          cache: 'pip'

      - name: Cache virtual environment
        uses: actions/cache@v4
        with:
          path: .venv
          key: ${{ runner.os }}-venv-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-venv-

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m venv .venv || echo "Virtual environment already exists"
          source .venv/bin/activate
          pip install -r requirements.txt
          pip install -r requirements-dev.txt || true

      - name: Install pre-commit
        shell: bash
        env:
          BASE_REF: ${{ github.base_ref || 'main' }}
        run: |
          source .venv/bin/activate
          pip install pre-commit
          pre-commit install || true

          # Filter origin/ prefix if exists in BASE_REF
          REF="origin/${BASE_REF#origin/}"
          pre-commit run --from-ref $REF --to-ref HEAD

      - name: Run pytest with coverage
        shell: bash
        run: |
          source .venv/bin/activate
          pytest --cov=. --cov-report=xml --cov-report=term-missing

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.codecov-token }}
          file: ./coverage.xml
          flags: unittests
          fail_ci_if_error: false

  # =============================================================================
  # Stage 3: SECURITY SCAN - Only runs if test passes (fail early!)
  # =============================================================================
  security-scan:
    name: Security Scan
    runs-on: petrosa-org-runners
    needs: test
    if: ${{ inputs.skip-security != true && (needs.test.result == 'success' || needs.test.result == 'skipped') }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        shell: bash
        run: |
          GITLEAKS_VERSION="8.18.4"
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" | tar -xz -C /tmp gitleaks
          /tmp/gitleaks detect --source . --no-git || echo "⚠️ Gitleaks found issues but continuing"
        continue-on-error: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}

      - name: Run Bandit
        shell: bash
        continue-on-error: true
        run: |
          pip install bandit[toml]
          bandit -r . -x ./venv,./.venv -v || {
            echo "⚠️ Bandit found issues but continuing (non-blocking)"
            exit 0
          }

      - name: Run Trivy
        uses: aquasecurity/trivy-action@0.24.0
        continue-on-error: true
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: success() || failure()
        with:
          sarif_file: 'trivy-results.sarif'

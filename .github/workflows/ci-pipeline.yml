name: 'Reusable CI Pipeline'
on:
  workflow_call:
    inputs:
      service-name:
        type: string
        required: true
      image-name:
        type: string
        required: true
      python-version:
        type: string
        required: false
        default: '3.11'
      coverage-threshold:
        type: string
        required: false
        default: '40'
      skip-lint:
        type: boolean
        required: false
        default: false
      skip-test:
        type: boolean
        required: false
        default: false
      skip-security:
        type: boolean
        required: false
        default: false
      skip-docker-build:
        type: boolean
        required: false
        default: false
    secrets:
      dockerhub-username:
        required: false
      dockerhub-token:
        required: false
      codecov-token:
        required: false

jobs:
  # =============================================================================
  # Stage 1: LINT - Fail early if linting fails
  # =============================================================================
  lint:
    name: Lint
    runs-on: petrosa-org-runners
    if: inputs.skip-lint != true
    outputs:
      passed: ${{ steps.result.outputs.passed }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}
          cache: 'pip'

      - name: Cache virtual environment
        uses: actions/cache@v4
        with:
          path: .venv
          key: ${{ runner.os }}-venv-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-venv-

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m venv .venv || echo "Virtual environment already exists"
          source .venv/bin/activate
          pip install ruff==0.3.4 mypy==1.9.0 black==24.3.0

      - name: Run Ruff
        shell: bash
        run: |
          source .venv/bin/activate
          ruff check .

      - name: Run Mypy
        shell: bash
        continue-on-error: true
        run: |
          source .venv/bin/activate
          mypy . || {
            echo "⚠️ Mypy found issues but continuing (non-blocking)"
            exit 0
          }

      - name: Check formatting with Black
        shell: bash
        run: |
          source .venv/bin/activate
          black --check . || {
            echo "⚠️ Black found formatting issues (non-blocking)"
          }

      - id: result
        shell: bash
        run: |
          echo "passed=true" >> $GITHUB_OUTPUT

  # =============================================================================
  # Stage 2: TEST - Only runs if lint passes (fail early!)
  # =============================================================================
  test:
    name: Test
    runs-on: petrosa-org-runners
    needs: lint
    if: ${{ inputs.skip-test != true && (needs.lint.result == 'success' || needs.lint.result == 'skipped') }}

    env:
      MONGODB_URL: "mongodb://testuser:testpass@localhost:27017/testdb" # gitleaks:allow
      MONGODB_URI: "mongodb://testuser:testpass@localhost:27017/testdb" # gitleaks:allow
      NATS_SERVERS: "nats://localhost:4222"
      NATS_ENABLED: "false"
      JWT_SECRET_KEY: "test-jwt-secret-key-for-testing-only"
      BINANCE_TESTNET: "true"
      SIMULATION_ENABLED: "true"
      ENVIRONMENT: "test"
      LOG_LEVEL: "DEBUG"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}
          cache: 'pip'

      - name: Cache virtual environment
        uses: actions/cache@v4
        with:
          path: .venv
          key: ${{ runner.os }}-venv-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-venv-

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m venv .venv || echo "Virtual environment already exists"
          source .venv/bin/activate
          pip install -r requirements.txt
          pip install -r requirements-dev.txt || true

      - name: Install pre-commit
        shell: bash
        env:
          BASE_REF: ${{ github.base_ref || 'main' }}
        run: |
          source .venv/bin/activate
          pip install pre-commit
          pre-commit install || true

          # Filter origin/ prefix if exists in BASE_REF
          REF="origin/${BASE_REF#origin/}"
          pre-commit run --from-ref $REF --to-ref HEAD

      - name: Run pytest with coverage
        shell: bash
        run: |
          source .venv/bin/activate
          pytest --cov=. --cov-report=xml --cov-report=term-missing

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.codecov-token }}
          file: ./coverage.xml
          flags: unittests
          fail_ci_if_error: false
